<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="48" y="48" width="416" height="416" rx="64" ry="64" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
  <!-- P -->
  <text x="160" y="320" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="240" fill="#ffffff" text-anchor="middle">P</text>
  <!-- L -->
  <text x="290" y="320" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="240" fill="#bfdbfe" text-anchor="middle">L</text>
  <!-- D -->
  <text x="410" y="320" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="240" fill="#93c5fd" text-anchor="middle">D</text>
  <!-- Subtle dot accent -->
  <circle cx="80" cy="80" r="24" fill="rgba(255,255,255,0.15)"/>
</svg>
